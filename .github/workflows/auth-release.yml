name: Auth Release

on:
  push:
    tags:
      - "auth/v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            binary_name: auth-linux-amd64
          - os: macos-14
            binary_name: auth-darwin-arm64
          - os: windows-2022
            binary_name: auth-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: backend/auth/go.mod
          cache-dependency-path: backend/auth/go.sum

      - name: Build
        working-directory: backend/auth
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -buildvcs=false -mod=readonly -ldflags="-s -w" -o ${{ matrix.binary_name }} .

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.binary_name }}
          path: backend/auth/${{ matrix.binary_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            cp "$dir"* release-assets/
          done
          ls -la release-assets/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release-assets/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes ""
